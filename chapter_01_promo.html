<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KEEPING TIME | Chapter 1: The Zap - Official Promo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,400;0,700;1,400&family=Outfit:wght@400;600;900&family=JetBrains+Mono:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #0a0a0c;
        --text: #eaeaea;
        --text-dim: #888888;
        --accent: #00f3ff;
        --accent-glow: #00f3ff;
        --warning: #ff3366;
        --gold: #ffd700;
        --purple: #9933ff;
        --wave-color: rgba(255, 255, 255, 0.03);
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        background-color: var(--bg);
        color: var(--text);
        font-family: 'Crimson Pro', serif;
        font-size: 1.25rem;
        line-height: 1.6;
        overflow-x: hidden;
        -webkit-font-smoothing: antialiased;
      }
      #progress-container {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 4px;
        background: transparent;
        z-index: 9999;
      }
      #progress-bar {
        height: 100%;
        width: 100%;
        background: linear-gradient(90deg, var(--accent), var(--gold));
        transform-origin: left;
        transform: scaleX(0);
        box-shadow: 0 0 20px var(--accent);
      }
      #scroll-hint {
        position: fixed;
        bottom: 40px;
        left: 50%;
        transform: translateX(-50%);
        color: var(--accent);
        font-family: 'Outfit', sans-serif;
        font-size: 0.9rem;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        z-index: 50;
        transition: opacity 0.6s;
        animation: pulse 2s infinite;
        text-shadow: 0 0 10px var(--accent);
      }
      #scroll-hint.hidden {
        opacity: 0;
      }
      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
          transform: translateX(-50%) scale(1);
        }
        50% {
          opacity: 0.7;
          transform: translateX(-50%) scale(1.05);
        }
      }
      @keyframes bounceHint {
        0%,
        100% {
          transform: translate(-50%, 0);
        }
        50% {
          transform: translate(-50%, 10px);
        }
      }
      #scroll-machine {
        position: relative;
        width: 100%;
      }
      #stage {
        position: sticky;
        top: 0;
        width: 100vw;
        height: 100vh;
        overflow: hidden;
        display: flex;
        justify-content: center;
        align-items: center;
        background: radial-gradient(
          circle at center,
          transparent 0%,
          transparent 80%
        );
        transition: background 0.3s;
      }
      #wave-bg {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 1;
      }
      #beat-container {
        position: relative;
        z-index: 10;
        width: 90%;
        max-width: 65ch;
        min-height: 50vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
      }
      .sentence {
        margin-bottom: 3.5rem;
        padding-left: 1.5rem;
        border-left: 3px solid transparent;
        will-change: transform, opacity, filter;
        transition: border-color 0.6s ease;
        opacity: 0;
        transform: translateY(30px);
      }
      .sentence.active {
        border-left-color: var(--accent);
        opacity: 1;
        filter: blur(0px);
        transform: translateY(0);
      }
      .sentence.past,
      .sentence.future {
        border-left-color: transparent;
        opacity: 0.1;
        filter: blur(4px);
      }
      .format-system {
        font-family: 'JetBrains Mono', monospace;
        font-size: 0.85rem;
        color: var(--accent);
        text-transform: uppercase;
        letter-spacing: 0.1em;
      }
      .format-warning {
        font-family: 'JetBrains Mono', monospace;
        font-size: 1.1rem;
        color: var(--warning);
        text-transform: uppercase;
        letter-spacing: 0.15em;
        text-shadow: 0 0 15px var(--warning);
        animation: glitch 0.3s infinite;
      }
      .format-gold {
        font-family: 'Outfit', sans-serif;
        font-weight: 900;
        font-size: 2rem;
        color: var(--gold);
        text-shadow:
          0 0 30px var(--gold),
          0 0 60px var(--gold);
        letter-spacing: 0.05em;
      }
      .format-purple {
        font-family: 'JetBrains Mono', monospace;
        font-size: 0.9rem;
        color: var(--purple);
        text-shadow: 0 0 10px var(--purple);
      }
      .beat-chapter {
        text-align: center;
      }
      .chapter-label {
        font-family: 'JetBrains Mono', monospace;
        font-size: 0.85rem;
        color: var(--accent);
        letter-spacing: 0.3em;
        text-transform: uppercase;
        margin-bottom: 1rem;
        display: block;
      }
      .chapter-title {
        font-family: 'Outfit', sans-serif;
        font-size: 4rem;
        font-weight: 900;
        line-height: 1.1;
        letter-spacing: -0.03em;
        margin-bottom: 2rem;
        background: linear-gradient(135deg, var(--accent), var(--gold));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        text-shadow: none;
        filter: drop-shadow(0 0 20px var(--accent));
      }
      .book-title {
        font-family: 'Outfit', sans-serif;
        font-size: 1rem;
        font-weight: 600;
        letter-spacing: 0.3em;
        text-transform: uppercase;
        color: var(--text-dim);
        margin-bottom: 0.5rem;
      }
      .tagline {
        font-family: 'Crimson Pro', serif;
        font-style: italic;
        font-size: 1.3rem;
        color: var(--text-dim);
        margin-bottom: 3rem;
      }
      @keyframes glitch {
        0% {
          transform: translate(0);
        }
        20% {
          transform: translate(-2px, 2px);
        }
        40% {
          transform: translate(-2px, -2px);
        }
        60% {
          transform: translate(2px, 2px);
        }
        80% {
          transform: translate(2px, -2px);
        }
        100% {
          transform: translate(0);
        }
      }
      .glitch-text {
        animation: glitch 0.2s infinite;
      }
      #ui-layer {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 100;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        padding: 1.5rem;
      }
      .ui-top {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        pointer-events: auto;
      }
      .logo {
        font-family: 'JetBrains Mono', monospace;
        font-size: 0.8rem;
        font-weight: 700;
        letter-spacing: 0.1em;
        color: var(--accent);
      }
      .volume-meter {
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
        text-align: right;
      }
      .meter-label {
        font-family: 'JetBrains Mono', monospace;
        font-size: 0.65rem;
        color: var(--text-dim);
        letter-spacing: 0.1em;
      }
      .meter-bar {
        width: 100px;
        height: 4px;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 2px;
        overflow: hidden;
      }
      .meter-fill {
        height: 100%;
        background: var(--accent);
        transition: width 0.3s;
        box-shadow: 0 0 10px var(--accent);
      }
      .meter-fill.warning {
        background: var(--warning);
        box-shadow: 0 0 10px var(--warning);
      }
      .meter-fill.gold {
        background: var(--gold);
        box-shadow: 0 0 10px var(--gold);
      }
      .cta-section {
        position: fixed;
        bottom: 100px;
        left: 50%;
        transform: translateX(-50%);
        text-align: center;
        z-index: 200;
        opacity: 0;
        transition: opacity 0.5s;
      }
      .cta-section.visible {
        opacity: 1;
      }
      .cta-button {
        display: inline-block;
        padding: 1rem 2rem;
        font-family: 'Outfit', sans-serif;
        font-size: 1rem;
        font-weight: 600;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--bg);
        background: var(--accent);
        border: none;
        cursor: pointer;
        text-decoration: none;
        box-shadow: 0 0 30px var(--accent);
        transition: all 0.3s;
      }
      .cta-button:hover {
        transform: scale(1.05);
        box-shadow: 0 0 50px var(--accent);
      }
      .cta-subtitle {
        font-family: 'Crimson Pro', serif;
        font-style: italic;
        font-size: 0.9rem;
        color: var(--text-dim);
        margin-top: 1rem;
      }
      @media (max-width: 768px) {
        body {
          font-size: 1.1rem;
        }
        .chapter-title {
          font-size: 2.5rem;
        }
        #ui-layer {
          padding: 1rem;
        }
        .sentence {
          padding-left: 1rem;
          margin-bottom: 2.5rem;
        }
        #scroll-hint {
          bottom: 70px;
        }
      }
    </style>
  </head>
  <body data-theme="dark">
    <div id="progress-container"><div id="progress-bar"></div></div>
    <div id="scroll-machine">
      <div id="stage">
        <canvas id="wave-bg"></canvas>
        <div id="beat-container"></div>
      </div>
    </div>
    <div id="scroll-hint">
      <span>Scroll to Experience</span
      ><svg
        width="24"
        height="24"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
      >
        <path d="M12 5v14M19 12l-7 7-7-7" />
      </svg>
    </div>
    <div id="ui-layer">
      <div class="ui-top">
        <div class="logo">KEEPING TIME</div>
        <div class="volume-meter">
          <div class="meter-label">SIGNAL INTENSITY</div>
          <div class="meter-bar">
            <div id="meter-fill" class="meter-fill" style="width: 10%"></div>
          </div>
        </div>
      </div>
    </div>
    <div id="cta-section" class="cta-section">
      <a href="#" class="cta-button">Read Chapter 1</a>
      <p class="cta-subtitle">The journey begins with a single note...</p>
    </div>

    <script>
      // Chapter 1 Promo - Key Dramatic Beats (10 beats)
      const NARRATIVE_DATA = [
        {
          type: 'chapter',
          sentences: [
            { text: 'KEEPING TIME', format: 'book-title' },
            { text: 'CHAPTER 1', format: 'chapter-label' },
            { text: 'THE ZAP', format: 'chapter-title' },
          ],
        },
        {
          type: 'standard',
          intensity: 0.4,
          sentences: [
            { text: '> SENSATION: BOOT_SEQUENCE', format: 'system' },
            {
              text: 'It hits you like a nail gun to the base of the skull.',
              format: 'standard',
            },
          ],
        },
        {
          type: 'standard',
          intensity: 0.7,
          sentences: [
            {
              text: 'White light. Static. The Score demands your total alignment.',
              format: 'standard',
              emphasis: true,
            },
          ],
        },
        {
          type: 'standard',
          intensity: 0.6,
          sentences: [
            { text: '> PERCEPTION: ONLINE', format: 'system' },
            {
              text: 'Reality is a shared hallucination with a very strict conductor.',
              format: 'standard',
            },
          ],
        },
        {
          type: 'standard',
          intensity: 0.7,
          sentences: [
            { text: '> THE FLOOR', format: 'chapter-label' },
            {
              text: 'The main calibration floor was a cathedral of data.',
              format: 'standard',
            },
          ],
        },
        {
          type: 'standard',
          intensity: 0.8,
          sentences: [
            {
              text: 'The Conductors call it harmony. I call it a cage.',
              format: 'standard',
              emphasis: true,
            },
          ],
        },
        {
          type: 'standard',
          intensity: 0.85,
          sentences: [
            {
              text: '"Hey, Wrong Note." "You\'re leaking signal. You\'re clipping, Taro. Badly."',
              format: 'dialogue',
            },
          ],
        },
        {
          type: 'standard',
          intensity: 0.95,
          sentences: [
            { text: '[PAIN] [PAIN] [PAIN]', format: 'warning' },
            {
              text: 'My vision flared red. Pain is just a sharp dissonance.',
              format: 'standard',
            },
          ],
        },
        {
          type: 'standard',
          intensity: 1.0,
          sentences: [
            { text: '> THE CRASH', format: 'chapter-label' },
            {
              text: 'He came in like a corrupted file. A storm of black and purple static.',
              format: 'standard',
            },
          ],
        },
        {
          type: 'standard',
          intensity: 1.0,
          sentences: [
            {
              text: 'EXECUTE: PITCH_SHIFT. 523.25 Hz. GOLD LIGHT erupted from my hand.',
              format: 'gold',
            },
          ],
        },
        {
          type: 'standard',
          intensity: 1.0,
          sentences: [
            { text: '> NEW_USER_ID: DETECTED', format: 'system' },
            {
              text: "It wasn't a Shield. IT WAS A CROWN.",
              format: 'gold',
              emphasis: true,
            },
          ],
        },
        {
          type: 'final',
          intensity: 0.3,
          sentences: [{ text: 'END CHAPTER 1', format: 'chapter-label' }],
        },
      ];

      class ScrollEngine {
        constructor(data) {
          this.data = data;
          this.currentBeatIndex = -1;
          this.beatMap = [];
          this.baseBeatHeight = window.innerHeight * 0.6;
          this.targetY = 0;
          this.currentY = 0;
          this.lerpFactor = 0.15;
        }
        init() {
          this._calculateHeights();
          document.getElementById('scroll-machine').style.height =
            this.totalHeight + 'px';
          this.targetY = this.currentY = window.scrollY;

          window.addEventListener(
            'scroll',
            () => {
              this.targetY = window.scrollY;
            },
            { passive: true },
          );

          window.addEventListener('resize', () => {
            this._calculateHeights();
            document.getElementById('scroll-machine').style.height =
              this.totalHeight + 'px';
          });

          this._loop();
        }
        _calculateHeights() {
          let currentPx = 0;
          this.beatMap = this.data.map((beat) => {
            const height = this.baseBeatHeight + beat.sentences.length * 120;
            const start = currentPx;
            currentPx += height;
            return { start, end: currentPx };
          });
          this.totalHeight = currentPx;
        }
        _loop() {
          const diff = this.targetY - this.currentY;
          const dist = Math.abs(diff);
          const dynamicFactor = Math.min(
            0.35,
            this.lerpFactor + dist * 0.00025,
          );

          if (dist > 0.5) {
            this.currentY += diff * dynamicFactor;
          } else {
            this.currentY = this.targetY;
          }

          this.tick();
          drawWaveform();
          requestAnimationFrame(() => this._loop());
        }
        tick() {
          const y = this.currentY;
          const maxScroll = Math.max(1, this.totalHeight - window.innerHeight);
          const globalProgress = Math.min(1, Math.max(0, y / maxScroll));

          document.getElementById('progress-bar').style.transform =
            `scaleX(${globalProgress})`;

          const hint = document.getElementById('scroll-hint');
          if (this.targetY > 50) hint.classList.add('hidden');
          else hint.classList.remove('hidden');

          // Show CTA at end
          const cta = document.getElementById('cta-section');
          if (globalProgress > 0.92) cta.classList.add('visible');
          else cta.classList.remove('visible');

          const activeIdx = this._calculateActiveBeat(y);

          if (activeIdx !== this.currentBeatIndex) {
            this.currentBeatIndex = activeIdx;
            this.renderBeat(activeIdx);
            this._updateIntensity(activeIdx);
          }

          const beat = this.data[this.currentBeatIndex];
          if (beat) {
            this._updateSentences(y, beat);
          }
        }
        _calculateActiveBeat(y) {
          for (let i = 0; i < this.beatMap.length; i++) {
            if (y >= this.beatMap[i].start && y < this.beatMap[i].end) return i;
          }
          return y >= this.totalHeight ? this.data.length - 1 : 0;
        }
        _updateIntensity(index) {
          const beat = this.data[index];
          const intensity = beat.intensity || 0.3;
          const meter = document.getElementById('meter-fill');

          meter.style.width = intensity * 100 + '%';

          meter.classList.remove('warning', 'gold');
          if (intensity >= 0.95) {
            meter.classList.add('warning');
          } else if (intensity >= 0.8) {
            meter.classList.add('gold');
          }

          // Update ambient glow
          const r = Math.floor(intensity * 0);
          const g = Math.floor(243 * intensity);
          const b = Math.floor(255 * intensity);
          document
            .getElementById('stage')
            .style.setProperty(
              '--ambient-center',
              `rgba(${r}, ${g}, ${b}, ${intensity * 0.2})`,
            );
        }
        renderBeat(index) {
          const beat = this.data[index];
          const container = document.getElementById('beat-container');
          let html =
            beat.type === 'chapter' || beat.type === 'final'
              ? '<div class="beat-chapter">'
              : '';

          beat.sentences.forEach((s, i) => {
            let cls = 'sentence';
            if (s.format === 'book-title') cls += ' book-title';
            else if (s.format === 'chapter-label') cls += ' chapter-label';
            else if (s.format === 'chapter-title') cls += ' chapter-title';
            else if (s.format === 'tagline') cls += ' tagline';
            else if (s.format === 'system') cls += ' format-system';
            else if (s.format === 'warning') cls += ' format-warning';
            else if (s.format === 'gold') cls += ' format-gold';
            else if (s.format === 'purple') cls += ' format-purple';
            else if (s.format === 'dialogue') cls += ' dialogue';

            if (s.glitch) cls += ' glitch-text';
            if (s.emphasis) cls += ' emphasis';

            html += `<div id="s-${i}" class="sentence future ${cls}">${s.text}</div>`;
          });

          if (beat.type === 'chapter' || beat.type === 'final')
            html += '</div>';
          container.innerHTML = html;
        }
        _updateSentences(y, beat) {
          const map = this.beatMap[this.currentBeatIndex];
          const beatProgress = (y - map.start) / (map.end - map.start);

          beat.sentences.forEach((s, i) => {
            const el = document.getElementById(`s-${i}`);
            if (!el) return;

            const sCount = beat.sentences.length;
            const sStart = i / sCount;
            const sEnd = (i + 1) / sCount;
            const sProgress = (beatProgress - sStart) / (sEnd - sStart);

            const smoothIntensity = Math.max(0, Math.sin(sProgress * Math.PI));
            const translateY = 20 * (sProgress - 0.5);
            const opacity = Math.pow(smoothIntensity, 0.8);
            const blur = (1 - smoothIntensity) * 8;
            const scale = 0.96 + smoothIntensity * 0.04;

            if (smoothIntensity > 0.6) {
              if (!el.classList.contains('active')) {
                el.classList.remove('past', 'future');
                el.classList.add('active');
              }
            } else {
              el.classList.remove('active');
              if (sProgress < 0.5) el.classList.add('future');
              else el.classList.add('past');
            }

            el.style.transform = `translateY(${translateY}px) scale(${scale})`;
            el.style.opacity = opacity;
            el.style.filter = `blur(${Math.min(12, blur)}px)`;
          });
        }
      }

      let intensity = 0.3;
      let currentBeatType = 'standard';
      function drawWaveform() {
        const canvas = document.getElementById('wave-bg');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const meterFill = document.getElementById('meter-fill');
        intensity = parseFloat(meterFill.style.width) / 100 || 0.3;

        // Get current beat context from engine
        const beat = window.engine?.data[window.engine.currentBeatIndex];
        if (beat) currentBeatType = beat.type;

        // Context-aware wave parameters based on narrative
        let waveSpeed, waveAmp, noiseLevel, lineCount;
        if (currentBeatType === 'chapter' || currentBeatType === 'final') {
          // Calm intro/outro
          waveSpeed = 0.0005;
          waveAmp = 0.08;
          noiseLevel = 10;
          lineCount = 3;
        } else if (intensity > 0.8) {
          // High intensity - chaotic (crash, pitch shift, crown)
          waveSpeed = 0.003;
          waveAmp = 0.25;
          noiseLevel = 50;
          lineCount = 7;
        } else if (intensity > 0.5) {
          // Medium intensity
          waveSpeed = 0.0015;
          waveAmp = 0.15;
          noiseLevel = 25;
          lineCount = 5;
        } else {
          // Low intensity - calm
          waveSpeed = 0.0008;
          waveAmp = 0.1;
          noiseLevel = 15;
          lineCount = 4;
        }

        ctx.strokeStyle = getComputedStyle(document.body).getPropertyValue(
          '--wave-color',
        );
        for (let j = 0; j < lineCount; j++) {
          ctx.beginPath();
          for (let x = 0; x < canvas.width; x += 6) {
            const noise =
              Math.sin(x * 0.05 + performance.now() * waveSpeed * 3) *
              (1 - intensity) *
              noiseLevel;
            const wave = Math.sin(
              x * 0.002 + performance.now() * waveSpeed + j * 0.7,
            );
            const y =
              canvas.height / 2 +
              (j - lineCount / 2 + 0.5) * 35 * intensity +
              wave * canvas.height * waveAmp * intensity +
              noise;
            if (x === 0) ctx.moveTo(x, y);
            else ctx.lineTo(x, y);
          }
          ctx.stroke();
        }
      }

      window.onload = () => {
        window.engine = new ScrollEngine(NARRATIVE_DATA);
        window.engine.init();
      };
    </script>
  </body>
</html>
